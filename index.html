  <meta name="apple-mobile-web-app-title" content="W杯日程" />

  <style>
:root{
  --black:#111;--dark:#202020;--red:#b80000;--text:#202020;--muted:#707070;
  --line:#d9d9d9;--paper:#fff;--soft:#f4f4f4;--japan:#fff1f1;--watch:#e9f3ff;
  --connector:#a9a9a9;
  font-family:Arial,Helvetica,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{margin:0;background:#f2f2f2;color:var(--text);-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit}
.app{max-width:1120px;margin:0 auto;background:#fff;min-height:100dvh}
.top{background:var(--black);color:#fff}
.logo{height:44px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid #333}
.blocks{display:flex;gap:2px}
.blocks span{display:grid;place-items:center;width:28px;height:28px;background:#fff;color:#111;font-weight:900;font-size:18px}
.title{padding:14px;background:#202020}
.title h1{margin:0;font-size:28px;line-height:1.05;font-weight:900;letter-spacing:-.02em}
.title p{margin:8px 0 0;color:#d0d0d0;font-size:13px}
.rule{height:4px;background:var(--red)}

.stage-tabs{display:grid;grid-template-columns:1fr 1fr;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
.stage-tab{border:0;background:#fff;padding:14px 10px;font-weight:900;font-size:15px;border-bottom:4px solid transparent}
.stage-tab.active{border-bottom-color:var(--red);color:var(--red)}
.update{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);font-size:13px}
.update strong{font-weight:900}
.refresh{border:1px solid var(--line);background:#fff;padding:7px 10px;font-weight:900}

.hero{padding:14px;border-bottom:1px solid var(--line)}
.hero-label{display:inline-block;background:var(--red);color:#fff;font-weight:900;font-size:12px;padding:5px 7px;margin-bottom:8px}
.hero h2{margin:0;font-size:22px;line-height:1.18;font-weight:900}
.hero-meta{margin:6px 0 0;color:var(--muted);font-size:13px}
.hero-time{display:flex;align-items:end;justify-content:space-between;gap:14px;margin-top:12px}
.hero-date{font-size:13px;color:var(--muted)}
.hero-clock{font-size:42px;line-height:.9;font-weight:900;letter-spacing:-.05em}

.count{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border-bottom:1px solid var(--line)}
.countbox{background:#fff;text-align:center;padding:11px 4px}
.countbox strong{display:block;font-size:24px;line-height:1;font-weight:900}
.countbox span{display:block;color:var(--muted);font-size:11px;margin-top:4px}

.filters{display:flex;gap:8px;overflow:auto;padding:12px 14px;background:var(--soft);border-bottom:1px solid var(--line);scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter{flex:0 0 auto;border:1px solid var(--line);background:#fff;padding:8px 10px;font-weight:900;font-size:13px}
.filter.active{background:var(--black);color:#fff;border-color:var(--black)}

.day{border-bottom:1px solid var(--line)}
.day-title{margin:0;padding:10px 14px;background:#e6e6e6;font-size:15px;font-weight:900}
.match{display:grid;grid-template-columns:74px 1fr auto;gap:12px;align-items:center;padding:12px 14px;background:#fff;border-top:1px solid var(--line)}
.match.japan{background:var(--japan)}
.time{font-size:20px;font-weight:900}
.stage{font-size:12px;color:var(--red);font-weight:900;margin-bottom:5px}
.teams{display:grid;gap:5px}
.team{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:900;line-height:1.2}
.flag{width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 26px;font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;font-size:20px;line-height:1;color:initial;-webkit-text-fill-color:initial;font-weight:400;text-shadow:none;filter:none}
.flag img{display:none}
.emoji-flag{font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif!important;color:initial!important;-webkit-text-fill-color:initial!important;font-weight:400!important;text-shadow:none!important;filter:none!important}
.code{color:var(--muted);font-size:12px;font-weight:800}
.note{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.35}
.badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:11px;font-weight:900;background:#eee;padding:5px 6px}
.badge.red{background:var(--red);color:#fff}
.badge.blue{background:#dcecff;color:#165a9f}
.empty{padding:24px 14px;color:var(--muted);font-weight:800}
.footer{padding:16px 14px 28px;color:var(--muted);font-size:12px;line-height:1.55}
.footer b{color:#333}


/* Group standings */
.standings{margin:12px 14px 14px;background:#071d46;color:#fff;border:1px solid rgba(255,255,255,.22);border-radius:22px;overflow:hidden}
.standings-title{text-align:center;font-weight:900;font-size:18px;padding:14px 10px}
.standings-head,.standings-row{display:grid;grid-template-columns:26px 36px minmax(142px,1fr) 36px 36px 36px 36px 44px 44px;align-items:center;gap:4px;padding:10px 12px}
.standings-head{color:rgba(255,255,255,.62);font-weight:900;font-size:12px}
.standings-row{font-size:14px;border-top:1px solid rgba(255,255,255,.07)}
.standings-row .rank{font-size:18px;text-align:center}
.standings-row .tri{color:#37d364;font-size:14px;text-align:center}
.standings-row .bar{color:#ff4b57;font-size:18px;text-align:center}
.standings-row .team-cell{display:flex;align-items:center;gap:8px;font-weight:900;min-width:0}
.standings-row .team-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.standings-line{height:2px;background:rgba(255,255,255,.34);margin:0 12px}
@media(max-width:640px){.standings{margin:10px 10px 12px;border-radius:18px}.standings-head,.standings-row{grid-template-columns:22px 28px minmax(124px,1fr) 30px 30px 30px 30px 36px 38px;padding:9px 8px;font-size:12px}.standings-title{font-size:16px}.standings-row .rank{font-size:16px}}

/* True bracket */
.bracket-wrap{background:#fff;overflow:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 28px}
.bracket-help{margin:0 0 14px;color:var(--muted);font-size:12px;font-weight:800}
.bracket{
  position:relative;
  display:grid;
  grid-template-columns:repeat(5, 230px);
  column-gap:44px;
  min-width:1320px;
  padding:8px 8px 20px;
  align-items:start;
}
.round{position:relative}
.round-title{background:#e6e6e6;border-left:5px solid var(--red);padding:9px 10px;font-size:14px;font-weight:900;margin-bottom:12px}
.bracket-lane{position:relative}
.bracket-card{
  position:absolute;
  left:0;
  width:230px;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:0 1px 0 rgba(0,0,0,.05);
}
.bracket-card.japan{background:var(--japan)}
.bracket-card.final-card{border:2px solid var(--red)}
.slot{display:flex;align-items:center;gap:8px;min-height:38px;padding:8px 10px;font-size:14px;font-weight:900}
.slot + .slot{border-top:1px solid var(--line)}
.slot .flag{width:24px;height:24px;font-size:18px}
.slot .flag img{display:none}
.emoji-flag{font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif!important;color:initial!important;-webkit-text-fill-color:initial!important;font-weight:400!important;text-shadow:none!important;filter:none!important}
.slot .slot-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot .code{margin-left:auto}
.bracket-meta{border-top:1px solid var(--line);padding:7px 10px;background:#fafafa;color:var(--muted);font-size:12px;font-weight:800;line-height:1.35}
.path-label{display:inline-block;background:var(--red);color:#fff;padding:3px 6px;font-size:11px;font-weight:900;margin:8px 10px 0}
.trophy{font-size:20px;margin-right:4px}
.connector{
  position:absolute;
  left:230px;
  width:44px;
  border-top:2px solid var(--connector);
  z-index:0;
}
.connector::after{
  content:"";
  position:absolute;
  right:0;
  width:2px;
  background:var(--connector);
}
.connector.up::after{bottom:0}
.connector.down::after{top:0}

.third-place{
  margin-top:18px;
  max-width:360px;
}
.third-place .bracket-card{
  position:relative;
  width:100%;
  left:auto;
  top:auto;
}

@media(max-width:640px){
  .title h1{font-size:25px}
  .hero h2{font-size:20px}
  .hero-clock{font-size:40px}
  .match{grid-template-columns:64px 1fr;gap:10px}
  .badges{grid-column:1/-1;justify-content:flex-start;margin-left:74px}
  .bracket-wrap{padding:12px 10px 24px}
  .bracket{grid-template-columns:repeat(5, 210px);column-gap:38px;min-width:1200px}
  .bracket-card{width:210px}
  .connector{left:210px;width:38px}
  .round-title{font-size:13px}
  .slot{font-size:13px}
}
@media(max-width:380px){
  .title h1{font-size:23px}
  .team{font-size:15px}
  .badges{margin-left:72px}
  .time{font-size:19px}
}
  </style>
</head>

function displayTime(m){return new Intl.DateTimeFormat("ja-JP",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Tokyo",hourCycle:"h23"}).format(localDate(m))}
function displayDate(m){return new Intl.DateTimeFormat("ja-JP",{month:"numeric",day:"numeric",weekday:"short",timeZone:"Asia/Tokyo"}).format(localDate(m))}
function groupKey(m){
  const p=new Intl.DateTimeFormat("en-CA",{year:"numeric",month:"2-digit",day:"2-digit",timeZone:"Asia/Tokyo"}).formatToParts(localDate(m));
  return `${p.find(x=>x.type==="year").value}-${p.find(x=>x.type==="month").value}-${p.find(x=>x.type==="day").value}`;
}
function nowText(){return new Intl.DateTimeFormat("ja-JP",{hour:"2-digit",minute:"2-digit",second:"2-digit",timeZone:"Asia/Tokyo",hourCycle:"h23"}).format(new Date())}
function isFinished(m){return localDate(m).getTime() + 2*60*60*1000 < Date.now()}
function all(){return (mode==="group"?GROUP_MATCHES:KNOCKOUT_MATCHES).filter(m=>!isFinished(m)).sort((a,b)=>localDate(a)-localDate(b))}
function isJapan(m){return m.a==="Japan"||m.b==="Japan"}
function watch(m){const h=Number(displayTime(m).split(":")[0]);return h>=7&&h<=12}
function t(name){return TEAM[name]||["",name,""]}
function flagHTML(flag){return flag?`<span class="emoji-flag" aria-hidden="true">${flag}</span>`:"🏳️"}
function teamHTML(name){const [flag,ja,code]=t(name);return `<div class="team"><span class="flag">${flagHTML(flag)}</span><span>${ja}</span><span class="code">${code}</span></div>`}
function slotHTML(name){const [flag,ja,code]=t(name);return `<div class="slot"><span class="flag">${flagHTML(flag)}</span><span class="slot-name">${ja}</span><span class="code">${code}</span></div>`}
function currentMatches(){
  let arr=all();
  if(filter==="japan")return arr.filter(isJapan);
  if(filter==="all")return arr;
  if(mode==="group")return arr.filter(m=>m.group===filter);
  return arr.filter(m=>m.stage===filter);
}
function renderFilters(){
  if(mode==="knockout"){
    filters.innerHTML=`<button class="filter ${filter!=="schedule"?"active":""}" data-filter="bracket">トーナメント</button><button class="filter ${filter==="schedule"?"active":""}" data-filter="schedule">試合日時順</button>`;
    filters.querySelectorAll("button").forEach(b=>b.onclick=()=>{filter=b.dataset.filter;render()});
    return;
  }
  const items=[{id:"all",label:"すべて"},{id:"japan",label:"日本戦"},..."ABCDEFGHIJKL".split("").map(g=>({id:g,label:`Group ${g}`}))];
  filters.innerHTML=items.map(i=>`<button class="filter ${filter===i.id?"active":""}" data-filter="${i.id}">${i.label}</button>`).join("");
  filters.querySelectorAll("button").forEach(b=>b.onclick=()=>{filter=b.dataset.filter;render()});
}
function renderHero(){
  const pool=currentMatches().length?currentMatches():all();
  next=pool[0]||null;
  if(!next){
    nextTitle.textContent="今後の試合はありません";
    nextMeta.textContent="終了済み日程は非表示です";
    nextDate.textContent="--";nextTime.textContent="--:--";
    return;
  }
  const [af,an]=t(next.a),[bf,bn]=t(next.b);
  nextTitle.textContent=`${an} vs ${bn}`;
  nextMeta.textContent=`${next.stage} / ${next.note}`;
  nextDate.textContent=displayDate(next);
  nextTime.textContent=displayTime(next);
  tick();
}
function tick(){
  if(!next)return;
  const diff=Math.max(0,localDate(next)-new Date());
  const sec=Math.floor(diff/1000);
  cD.textContent=String(Math.floor(sec/86400)).padStart(2,"0");
  cH.textContent=String(Math.floor((sec%86400)/3600)).padStart(2,"0");
  cM.textContent=String(Math.floor((sec%3600)/60)).padStart(2,"0");
  cS.textContent=String(sec%60).padStart(2,"0");
}

const GROUP_TEAMS = {
  A:["Mexico","South Africa","South Korea","Czechia"], B:["Canada","Bosnia and Herzegovina","Qatar","Switzerland"],
  C:["Brazil","Morocco","Haiti","Scotland"], D:["United States","Paraguay","Australia","Turkey"],
  E:["Germany","Curacao","Ivory Coast","Ecuador"], F:["Netherlands","Japan","Sweden","Tunisia"],
  G:["Belgium","Egypt","Iran","New Zealand"], H:["Spain","Cape Verde","Saudi Arabia","Uruguay"],
  I:["France","Senegal","Iraq","Norway"], J:["Argentina","Algeria","Austria","Jordan"],
  K:["Portugal","DR Congo","Uzbekistan","Colombia"], L:["England","Croatia","Ghana","Panama"]
};
function mockStatsFor(group){
  const teams=GROUP_TEAMS[group]||[];
  return teams.map((name,i)=>({name, gp:0,w:0,d:0,l:0,gd:0,pts:0,rank:i+1}));
}
function renderStandings(group){
  if(!group || group==="all" || group==="japan") return "";
  const rows=mockStatsFor(group);
  if(!rows.length) return "";
  return `<section class="standings"><div class="standings-title">グループ ${group}</div>
    <div class="standings-head"><span></span><span></span><span>チーム</span><span>GP</span><span>W</span><span>D</span><span>L</span><span>GD</span><span>PTS</span></div>
    ${rows.map((r,i)=>`${i===2?'<div class="standings-line"></div>':''}<div class="standings-row">
      <span class="${i<2?'tri':'bar'}">${i<2?'▶':(i===3?'−':'')}</span><span class="rank">${r.rank}</span>
      <span class="team-cell"><span class="flag">${flagHTML(t(r.name)[0])}</span><span class="team-name">${t(r.name)[1]}</span></span>
      <span>${r.gp}</span><span>${r.w}</span><span>${r.d}</span><span>${r.l}</span><span>${r.gd>0?`+${r.gd}`:r.gd}</span><span>${r.pts}</span>
    </div>`).join("")}</section>`;
}

function renderGroupList(){
  const grouped=currentMatches().reduce((a,m)=>{(a[groupKey(m)]??=[]).push(m);return a},{});
  const keys=Object.keys(grouped).sort();
  content.innerHTML=renderStandings(mode==="group"?filter:"")+keys.map(k=>{
    const ms=grouped[k];
    return `<section class="day"><h2 class="day-title">${displayDate(ms[0])}</h2>${ms.map(m=>`
      <article class="match ${isJapan(m)?"japan":""}">
        <div class="time">${displayTime(m)}</div>
        <div>
          <div class="stage">${m.stage}</div>
          <div class="teams">${teamHTML(m.a)}${teamHTML(m.b)}</div>
          <div class="note">${m.note}</div>
        </div>
        <div class="badges">
          ${isJapan(m)?'<span class="badge red">日本</span>':""}
          ${watch(m)?'<span class="badge blue">見やすい</span>':""}
          <span class="badge">JST</span>
        </div>
      </article>`).join("")}</section>`
  }).join("") || `<div class="empty">表示できる今後の試合はありません。</div>`;
}
function bracketCard(m, top, roundIndex, pairIndex){
  const cardH=116;
  const html=`<article class="bracket-card ${isJapan(m)?"japan":""} ${m.stage==="決勝"?"final-card":""}" style="top:${top}px">
    ${m.stage==="決勝"?'<div class="path-label"><span class="trophy">🏆</span>FINAL</div>':""}
    ${slotHTML(m.a)}${slotHTML(m.b)}
    <div class="bracket-meta">${displayDate(m)} ${displayTime(m)} JST<br>${m.note}</div>
  </article>`;
  return html;
}
function connector(topFrom, topTo, cardHeight=116){
  const y1=topFrom+cardHeight/2;
  const y2=topTo+cardHeight/2;
  const top=Math.min(y1,y2);
  const height=Math.abs(y2-y1);
  const cls=y1<y2?"down":"up";
  return `<span class="connector ${cls}" style="top:${top}px;height:${height}px"></span>`;
}
function renderBracket(){
  const roundDefs=[
    {name:"ベスト32", key:"ベスト32", gap:22, topBase:44},
    {name:"ベスト16", key:"ベスト16", gap:160, topBase:113},
    {name:"準々決勝", key:"準々決勝", gap:436, topBase:251},
    {name:"準決勝", key:"準決勝", gap:988, topBase:527},
    {name:"決勝", key:"決勝", gap:0, topBase:1079}
  ];
  const cardH=116;
  const roundHtml=roundDefs.map((rd,ri)=>{
    const ms=KNOCKOUT_MATCHES.filter(m=>m.stage===rd.key && !isFinished(m));
    const cards=ms.map((m,i)=>bracketCard(m, rd.topBase + i*(cardH+rd.gap), ri, i)).join("");
    let lines="";
    if(ri<4){
      const currentCount=ms.length;
      const nextRd=roundDefs[ri+1];
      for(let i=0;i<currentCount;i+=2){
        const fromTop=rd.topBase + i*(cardH+rd.gap);
        const fromTop2=rd.topBase + (i+1)*(cardH+rd.gap);
        const targetTop=nextRd.topBase + Math.floor(i/2)*(cardH+nextRd.gap);
        lines += connector(fromTop, targetTop, cardH);
        if(i+1<currentCount) lines += connector(fromTop2, targetTop, cardH);
      }
    }
    return `<section class="round"><h2 class="round-title">${rd.name}</h2><div class="bracket-lane" style="height:1240px">${cards}${lines}</div></section>`;
  }).join("");
  const third=KNOCKOUT_MATCHES.find(m=>m.stage==="3位決定戦" && !isFinished(m));
  content.innerHTML=`<section class="bracket-wrap">
    <p class="bracket-help">横にスワイプすると、ベスト32から決勝まで左から右へ進むトーナメントを見られます。</p>
    <div class="bracket">${roundHtml}</div>
    <section class="third-place day">
      <h2 class="day-title">3位決定戦</h2>
      ${third ? `<article class="bracket-card">${slotHTML(third.a)}${slotHTML(third.b)}<div class="bracket-meta">${displayDate(third)} ${displayTime(third)} JST<br>${third.note}</div></article>` : '<div class="empty">確定待ち</div>'}
    </section>
  </section>`;
}
function render(){
  stageName.textContent=mode==="group"?"グループステージ":"ノックアウト";
  renderFilters();
  renderHero();
  if(mode==="group" || filter==="schedule")renderGroupList();else renderBracket();
  updatedAt.textContent=nowText();
}
stageButtons.forEach(b=>b.onclick=()=>{
  stageButtons.forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  mode=b.dataset.stage;
  filter=mode==="knockout"?"bracket":"all";
  render();
});
$("#refreshBtn").onclick=render;
document.addEventListener("visibilitychange",()=>{if(!document.hidden)render()});
window.addEventListener("focus",render);
window.addEventListener("online",render);
setInterval(render,15*60*1000);
setInterval(tick,1000);
render();
</script>
</body>
</html>

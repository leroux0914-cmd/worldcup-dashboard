<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="W杯日程" />
  <title>W杯2026 日程｜日本時間</title>
  <style>
:root{
  --black:#111;--dark:#202020;--red:#b80000;--text:#202020;--muted:#707070;
  --line:#d9d9d9;--paper:#fff;--soft:#f4f4f4;--japan:#fff1f1;--watch:#e9f3ff;
  --connector:#a9a9a9;
  font-family:Arial,Helvetica,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{margin:0;background:#f2f2f2;color:var(--text);-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit}
.app{max-width:1120px;margin:0 auto;background:#fff;min-height:100dvh}
.top{background:var(--black);color:#fff}
.logo{height:44px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid #333}
.blocks{display:flex;gap:2px}
.blocks span{display:grid;place-items:center;width:28px;height:28px;background:#fff;color:#111;font-weight:900;font-size:18px}
.title{padding:14px;background:#202020}
.title h1{margin:0;font-size:28px;line-height:1.05;font-weight:900;letter-spacing:-.02em}
.title p{margin:8px 0 0;color:#d0d0d0;font-size:13px}
.rule{height:4px;background:var(--red)}

.stage-tabs{display:grid;grid-template-columns:1fr 1fr;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
.stage-tab{border:0;background:#fff;padding:14px 10px;font-weight:900;font-size:15px;border-bottom:4px solid transparent}
.stage-tab.active{border-bottom-color:var(--red);color:var(--red)}
.update{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);font-size:13px}
.update strong{font-weight:900}
.refresh{border:1px solid var(--line);background:#fff;padding:7px 10px;font-weight:900}

.hero{padding:14px;border-bottom:1px solid var(--line)}
.hero-label{display:inline-block;background:var(--red);color:#fff;font-weight:900;font-size:12px;padding:5px 7px;margin-bottom:8px}
.hero h2{margin:0;font-size:22px;line-height:1.18;font-weight:900}
.hero-meta{margin:6px 0 0;color:var(--muted);font-size:13px}
.hero-time{display:flex;align-items:end;justify-content:space-between;gap:14px;margin-top:12px}
.hero-date{font-size:13px;color:var(--muted)}
.hero-clock{font-size:42px;line-height:.9;font-weight:900;letter-spacing:-.05em}

.count{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border-bottom:1px solid var(--line)}
.countbox{background:#fff;text-align:center;padding:11px 4px}
.countbox strong{display:block;font-size:24px;line-height:1;font-weight:900}
.countbox span{display:block;color:var(--muted);font-size:11px;margin-top:4px}

.filters{display:flex;gap:8px;overflow:auto;padding:12px 14px;background:var(--soft);border-bottom:1px solid var(--line);scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter{flex:0 0 auto;border:1px solid var(--line);background:#fff;padding:8px 10px;font-weight:900;font-size:13px}
.filter.active{background:var(--black);color:#fff;border-color:var(--black)}

.day{border-bottom:1px solid var(--line)}
.day-title{margin:0;padding:10px 14px;background:#e6e6e6;font-size:15px;font-weight:900}
.match{display:grid;grid-template-columns:74px 1fr auto;gap:12px;align-items:center;padding:12px 14px;background:#fff;border-top:1px solid var(--line)}
.match.japan{background:var(--japan)}
.time{font-size:20px;font-weight:900}
.stage{font-size:12px;color:var(--red);font-weight:900;margin-bottom:5px}
.teams{display:grid;gap:5px}
.team{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:900;line-height:1.2}
.team .score{margin-left:auto;font-size:17px;font-weight:900;color:#111;min-width:18px;text-align:center}
.flag{font-size:20px;width:26px;text-align:center}
.code{color:var(--muted);font-size:12px;font-weight:800}
.note{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.35}
.badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:11px;font-weight:900;background:#eee;padding:5px 6px}
.badge.red{background:var(--red);color:#fff}
.badge.blue{background:#dcecff;color:#165a9f}
.empty{padding:24px 14px;color:var(--muted);font-weight:800}
.footer{padding:16px 14px 28px;color:var(--muted);font-size:12px;line-height:1.55}
.footer b{color:#333}

/* BBC style one-sided knockout bracket v40 */
.bracket-wrap{background:#fff;overflow:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 28px;scroll-snap-type:x proximity;touch-action:pan-x pan-y}
.bracket-help{margin:0 0 14px;color:var(--muted);font-size:12px;font-weight:800}
.bracket-stage{
  --card-w:220px;
  --card-h:118px;
  --col-gap:58px;
  --title-h:34px;
  --line-w:2px;
  position:relative;
  width:1360px;
  height:2480px;
  padding:0 8px 20px;
  background:#fff;
}
.bracket-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:visible}
.bracket-svg path{fill:none;stroke:var(--connector);stroke-width:2;shape-rendering:crispEdges}
.round-title{
  position:absolute;
  top:0;
  width:var(--card-w);
  background:#e6e6e6;
  border-left:5px solid var(--red);
  padding:9px 10px;
  font-size:14px;
  font-weight:900;
  z-index:2;
}
.bracket-card{
  position:absolute;
  width:var(--card-w);
  min-height:var(--card-h);
  background:#fff;
  border:1px solid var(--line);
  box-shadow:0 1px 0 rgba(0,0,0,.05);
  z-index:1;
}
.bracket-card.japan{background:var(--japan)}
.bracket-card.final-card{border:2px solid var(--red);box-shadow:0 2px 0 rgba(184,0,0,.14);z-index:3}
.bracket-card.final-main{transform:translateY(-8px)}
.bracket-card.final-card::after{content:"";position:absolute;left:-2px;right:-2px;bottom:-5px;height:4px;background:var(--red)}
.slot{display:flex;align-items:center;gap:8px;min-height:38px;padding:8px 10px;font-size:14px;font-weight:900}
.slot + .slot{border-top:1px solid var(--line)}
.slot .flag{font-size:18px;width:24px;flex:0 0 24px}
.slot .slot-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.slot.winner .slot-name{font-weight:900}
.slot.loser{color:var(--muted)}
.slot .score{margin-left:auto;font-size:15px;font-weight:900;color:#111;min-width:18px;text-align:center}
.slot .code{color:var(--muted);font-size:11px;font-weight:900;margin-left:4px;min-width:28px;text-align:right}
.bracket-meta{border-top:1px solid var(--line);padding:7px 10px;background:#fafafa;color:var(--muted);font-size:12px;font-weight:800;line-height:1.35}
.match-state{display:flex;gap:5px;flex-wrap:wrap;margin:0 10px 7px}
.state-pill{display:inline-flex;align-items:center;height:18px;background:#eee;padding:0 6px;font-size:10px;font-weight:900;color:#333}
.state-pill.live{background:var(--red);color:#fff}
.state-pill.extra{background:#111;color:#fff}
.path-label{display:inline-flex;align-items:center;background:var(--red);color:#fff;padding:3px 6px;font-size:11px;font-weight:900;margin:8px 10px 0}
.trophy{font-size:17px;margin-right:4px}
.bracket-center-note{position:absolute;text-align:center;color:var(--muted);font-size:11px;font-weight:900;line-height:1.35;width:var(--card-w);z-index:2}
.third-place-title{position:absolute;width:var(--card-w);background:#e6e6e6;border-left:5px solid var(--red);padding:9px 10px;font-size:14px;font-weight:900;z-index:2}
.bracket-card.third-card{border:1px solid var(--line);box-shadow:0 1px 0 rgba(0,0,0,.05)}
@media(max-width:640px){
  .title h1{font-size:25px}
  .hero h2{font-size:20px}
  .hero-clock{font-size:40px}
  .match{grid-template-columns:64px 1fr;gap:10px}
  .badges{grid-column:1/-1;justify-content:flex-start;margin-left:74px}
  .bracket-wrap{padding:12px 10px 24px}
  .bracket-stage{width:1360px;height:2480px}
  .round-title{font-size:13px}
  .slot{font-size:13px}
}
@media(max-width:380px){
  .title h1{font-size:23px}
  .team{font-size:15px}
  .badges{margin-left:72px}
  .time{font-size:19px}
}
  </style>
</head>

let mode="group", filter="all", next=null;

function localDate(m){return new Date(m.source)}
function displayTime(m){return new Intl.DateTimeFormat("ja-JP",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Tokyo",hourCycle:"h23"}).format(localDate(m))}
function displayDate(m){return new Intl.DateTimeFormat("ja-JP",{month:"numeric",day:"numeric",weekday:"short",timeZone:"Asia/Tokyo"}).format(localDate(m))}
function groupKey(m){
  const p=new Intl.DateTimeFormat("en-CA",{year:"numeric",month:"2-digit",day:"2-digit",timeZone:"Asia/Tokyo"}).formatToParts(localDate(m));
  return `${p.find(x=>x.type==="year").value}-${p.find(x=>x.type==="month").value}-${p.find(x=>x.type==="day").value}`;
}
function nowText(){return new Intl.DateTimeFormat("ja-JP",{hour:"2-digit",minute:"2-digit",second:"2-digit",timeZone:"Asia/Tokyo",hourCycle:"h23"}).format(new Date())}
function isFinished(m){return localDate(m).getTime() + 2*60*60*1000 < Date.now()}
function all(){return (mode==="group"?GROUP_MATCHES:KNOCKOUT_MATCHES).filter(m=>!isFinished(m)).sort((a,b)=>localDate(a)-localDate(b))}
function isJapan(m){return m.a==="Japan"||m.b==="Japan"}
function watch(m){const h=Number(displayTime(m).split(":")[0]);return h>=7&&h<=12}
function t(name){
  if(name && String(name).startsWith("勝者")) return ["🏳️",name,""];
  if(name && String(name).startsWith("敗者")) return ["🏳️",name,""];
  return TEAM[name]||["🏳️",name||"未定",""]
}
function teamHTML(name, score=""){const [flag,ja,code]=t(name);return `<div class="team"><span class="flag">${flag}</span><span>${ja}</span>${score!==""?`<span class="score">${score}</span>`:""}<span class="code">${code}</span></div>`}
function slotHTML(name, score="", state=""){
  const [flag,ja,code]=t(name);
  return `<div class="slot ${state}"><span class="flag">${flag}</span><span class="slot-name">${ja}</span><span class="score">${score!==""?score:"–"}</span><span class="code">${code}</span></div>`
}
function statusPills(m){
  const pills=[];
  const st=String(m.status||"").toUpperCase();
  if(m.live || st==="LIVE" || st==="IN_PROGRESS") pills.push(`<span class="state-pill live">LIVE</span>`);
  if(st==="HALFTIME") pills.push(`<span class="state-pill live">HT</span>`);
  if(st==="ET") pills.push(`<span class="state-pill extra">ET</span>`);
  if(st==="AET") pills.push(`<span class="state-pill extra">AET</span>`);
  if(st==="PEN") pills.push(`<span class="state-pill extra">PEN</span>`);
  if(m.aet && !pills.some(p=>p.includes('AET')||p.includes('ET'))) pills.push(`<span class="state-pill extra">延長</span>`);
  if(m.pk) pills.push(`<span class="state-pill extra">PK</span>`);
  if(st==="FINAL" || st==="FT" || st==="FULL_TIME") pills.push(`<span class="state-pill">FT</span>`);
  return pills.length?`<div class="match-state">${pills.join("")}</div>`:"";
}
function scoreFor(m, side){
  const key=side==='a'?'scoreA':'scoreB';
  if(Number.isFinite(m[key])) return m[key];
  return "";
}
function winnerOf(m){
  if(!m) return null;
  const a=Number.isFinite(m.scoreA)?m.scoreA:null;
  const b=Number.isFinite(m.scoreB)?m.scoreB:null;
  if(a===null||b===null) return null;
  if(a>b) return m.a;
  if(b>a) return m.b;
  if(m.pk && Number.isFinite(m.pkA) && Number.isFinite(m.pkB)) return m.pkA>m.pkB?m.a:m.b;
  return null;
}
function loserOf(m){
  const w=winnerOf(m);
  if(!w) return null;
  return w===m.a?m.b:m.a;
}

function setMatchScore(target, data){
  if(!target || !data) return;
  ["a","b","scoreA","scoreB","pkA","pkB","status","live","aet","pk","winner"].forEach(k=>{
    if(data[k]!==undefined && data[k]!==null && data[k]!=="") target[k]=data[k];
  });
}
function teamNameFromApi(v){
  if(!v) return "";
  const raw=String(v.displayName||v.name||v.shortDisplayName||v.team||v.abbreviation||"").trim();
  const map={MEX:"Mexico",RSA:"South Africa",KOR:"South Korea",CZE:"Czechia",CAN:"Canada",BIH:"Bosnia and Herzegovina",QAT:"Qatar",SUI:"Switzerland",BRA:"Brazil",MAR:"Morocco",HTI:"Haiti",SCO:"Scotland",USA:"United States",PAR:"Paraguay",AUS:"Australia",TUR:"Turkey",GER:"Germany",CUW:"Curacao",CIV:"Ivory Coast",ECU:"Ecuador",NED:"Netherlands",JPN:"Japan",SWE:"Sweden",TUN:"Tunisia",BEL:"Belgium",EGY:"Egypt",IRI:"Iran",NZL:"New Zealand",ESP:"Spain",CPV:"Cape Verde",KSA:"Saudi Arabia",URU:"Uruguay",FRA:"France",SEN:"Senegal",IRQ:"Iraq",NOR:"Norway",ARG:"Argentina",DZA:"Algeria",AUT:"Austria",JOR:"Jordan",POR:"Portugal",COD:"DR Congo",UZB:"Uzbekistan",COL:"Colombia",ENG:"England",CRO:"Croatia",GHA:"Ghana",PAN:"Panama"};
  return map[raw]||raw||"TBD";
}
function normalizeOneMatch(m){
  if(!m) return null;
  if(m.competitions && m.competitions[0]){
    const comp=m.competitions[0];
    const comps=comp.competitors||[];
    const home=comps.find(c=>c.homeAway==="home")||comps[0]||{};
    const away=comps.find(c=>c.homeAway==="away")||comps[1]||{};
    const st=(m.status&&m.status.type)||{};
    const statusName=String(st.name||st.state||"").toUpperCase();
    const live=statusName.includes("IN")||statusName.includes("LIVE")||st.state==="in";
    const completed=!!st.completed || statusName.includes("FINAL") || statusName.includes("STATUS_FINAL");
    return {
      id:String(m.id||""),
      a:teamNameFromApi(away.team||away),
      b:teamNameFromApi(home.team||home),
      scoreA:away.score!==undefined?Number(away.score):undefined,
      scoreB:home.score!==undefined?Number(home.score):undefined,
      status:live?"LIVE":completed?"FT":String(st.shortDetail||st.description||"").toUpperCase(),
      live,
      pk:!!(m.shootout || comp.shootout || String(st.detail||"").toUpperCase().includes("PEN")),
      aet:String(st.detail||"").toUpperCase().includes("ET")||String(st.detail||"").toUpperCase().includes("AET")
    };
  }
  return {
    id:String(m.id||m.apiId||m.matchId||""),
    seed:Number.isFinite(Number(m.seed))?Number(m.seed):undefined,
    stage:m.stage||m.round||m.roundName,
    a:m.a||m.home||m.teamA||m.awayTeam,
    b:m.b||m.away||m.teamB||m.homeTeam,
    scoreA:Number.isFinite(Number(m.scoreA??m.homeScore??m.awayScore))?Number(m.scoreA??m.homeScore??m.awayScore):undefined,
    scoreB:Number.isFinite(Number(m.scoreB??m.awayScore??m.homeScore))?Number(m.scoreB??m.awayScore??m.homeScore):undefined,
    pkA:Number.isFinite(Number(m.pkA??m.penaltyA))?Number(m.pkA??m.penaltyA):undefined,
    pkB:Number.isFinite(Number(m.pkB??m.penaltyB))?Number(m.pkB??m.penaltyB):undefined,
    status:m.status,
    live:!!m.live,
    aet:!!m.aet,
    pk:!!m.pk,
    winner:m.winner
  };
}
function normalizeApiPayload(payload){
  if(!payload) return [];
  const raw=Array.isArray(payload)?payload:(payload.matches||payload.games||payload.events||payload.data||[]);
  return raw.map(normalizeOneMatch).filter(Boolean);
}
function applyApiMatches(items){
  items.forEach(item=>{
    const id=String(item.id||"");
    let target=KNOCKOUT_MATCHES.find(m=>String(m.apiId)===id || String(m.logicalId)===id);
    if(!target && Number.isFinite(item.seed)) target=KNOCKOUT_MATCHES.find(m=>m.seed===item.seed);
    if(!target && item.stage) target=KNOCKOUT_MATCHES.find(m=>m.stage===item.stage && (m.a===item.a || m.b===item.b || m.a==="TBD" || m.b==="TBD"));
    setMatchScore(target,item);
  });
}
async function refreshApiData({silent=false}={}){
  if(!API_CONFIG.enabled || apiBusy) return false;
  apiBusy=true;
  try{
    for(const url of API_CONFIG.endpoints){
      try{
        const res=await fetch(url,{cache:"no-store"});
        if(!res.ok) continue;
        const payload=await res.json();
        const items=normalizeApiPayload(payload);
        if(items.length){
          applyApiMatches(items);
          apiLastSuccess=nowText();
          if(!silent) render();
          return true;
        }
      }catch(e){}
    }
  }finally{
    apiBusy=false;
  }
  return false;
}

function currentMatches(){
  let arr=all();
  if(mode==="knockout"){
    return arr;
  }
  if(filter==="japan")return arr.filter(isJapan);
  if(filter==="all")return arr;
  return arr.filter(m=>m.group===filter);
}
function renderFilters(){
  if(mode==="knockout"){
    if(filter!=="schedule") filter="bracket";
    const items=[{id:"bracket",label:"勝ち上がり表"},{id:"schedule",label:"試合日時順"}];
    filters.innerHTML=items.map(i=>`<button class="filter ${filter===i.id?"active":""}" data-filter="${i.id}">${i.label}</button>`).join("");
    filters.querySelectorAll("button").forEach(b=>b.onclick=()=>{filter=b.dataset.filter;render()});
    return;
  }
  const items=[{id:"all",label:"すべて"},{id:"japan",label:"日本戦"},..."ABCDEFGHIJKL".split("").map(g=>({id:g,label:`Group ${g}`}))];
  filters.innerHTML=items.map(i=>`<button class="filter ${filter===i.id?"active":""}" data-filter="${i.id}">${i.label}</button>`).join("");
  filters.querySelectorAll("button").forEach(b=>b.onclick=()=>{filter=b.dataset.filter;render()});
}
function renderHero(){
  const pool=currentMatches().length?currentMatches():all();
  next=pool[0]||null;
  if(!next){
    nextTitle.textContent="今後の試合はありません";
    nextMeta.textContent="終了済み日程は非表示です";
    nextDate.textContent="--";nextTime.textContent="--:--";
    return;
  }
  const [af,an]=t(next.a),[bf,bn]=t(next.b);
  nextTitle.textContent=`${af} ${an} vs ${bf} ${bn}`;
  nextMeta.textContent=`${next.stage} / ${next.note}`;
  nextDate.textContent=displayDate(next);
  nextTime.textContent=displayTime(next);
  tick();
}
function tick(){
  if(!next)return;
  const diff=Math.max(0,localDate(next)-new Date());
  const sec=Math.floor(diff/1000);
  cD.textContent=String(Math.floor(sec/86400)).padStart(2,"0");
  cH.textContent=String(Math.floor((sec%86400)/3600)).padStart(2,"0");
  cM.textContent=String(Math.floor((sec%3600)/60)).padStart(2,"0");
  cS.textContent=String(sec%60).padStart(2,"0");
}
function renderGroupList(){
  const grouped=currentMatches().reduce((a,m)=>{(a[groupKey(m)]??=[]).push(m);return a},{});
  const keys=Object.keys(grouped).sort();
  content.innerHTML=keys.map(k=>{
    const ms=grouped[k];
    return `<section class="day"><h2 class="day-title">${displayDate(ms[0])}</h2>${ms.map(m=>`
      <article class="match ${isJapan(m)?"japan":""}">
        <div class="time">${displayTime(m)}</div>
        <div>
          <div class="stage">${m.stage}</div>
          <div class="teams">${teamHTML(m.a,scoreFor(m,"a"))}${teamHTML(m.b,scoreFor(m,"b"))}</div>
          ${statusPills(m)}
          <div class="note">${m.note}</div>
        </div>
        <div class="badges">
          ${isJapan(m)?'<span class="badge red">日本</span>':""}
          ${watch(m)?'<span class="badge blue">見やすい</span>':""}
          <span class="badge">JST</span>
        </div>
      </article>`).join("")}</section>`
  }).join("") || `<div class="empty">表示できる今後の試合はありません。</div>`;
}
function bracketCard(m, x, y, cls=""){
  const finalLabel = m.stage==="決勝"?'<div class="path-label"><span class="trophy">🏆</span>FINAL</div>':"";
  const pkText = m.pk && Number.isFinite(m.pkA) && Number.isFinite(m.pkB) ? ` / PK ${m.pkA}-${m.pkB}` : "";
  const aState = winnerOf(m)===m.a ? "winner" : winnerOf(m)===m.b ? "loser" : "";
  const bState = winnerOf(m)===m.b ? "winner" : winnerOf(m)===m.a ? "loser" : "";
  return `<article class="bracket-card ${isJapan(m)?"japan":""} ${m.stage==="決勝"?"final-card":""} ${cls}" style="left:${x}px;top:${y}px">
    ${finalLabel}
    ${slotHTML(m.a, scoreFor(m,"a"), aState)}${slotHTML(m.b, scoreFor(m,"b"), bState)}
    ${statusPills(m)}
    <div class="bracket-meta">${displayDate(m)} ${displayTime(m)} JST${pkText}<br>${m.note}</div>
  </article>`;
}
function makeStepPath(fromX, fromY, toX, toY){
  const midX=Math.round((fromX+toX)/2);
  return `M ${fromX} ${fromY} H ${midX} V ${toY} H ${toX}`;
}
function matchLabel(roundLabel, i){return `${roundLabel}${String(i+1).padStart(2,"0")}`}
function enrichKnockout(){
  const byStage={
    r32:KNOCKOUT_MATCHES.filter(m=>m.stage==="ベスト32").sort((a,b)=>a.seed-b.seed).map(m=>({...m})),
    r16:KNOCKOUT_MATCHES.filter(m=>m.stage==="ベスト16").sort((a,b)=>a.seed-b.seed).map(m=>({...m})),
    qf:KNOCKOUT_MATCHES.filter(m=>m.stage==="準々決勝").sort((a,b)=>a.seed-b.seed).map(m=>({...m})),
    sf:KNOCKOUT_MATCHES.filter(m=>m.stage==="準決勝").sort((a,b)=>a.seed-b.seed).map(m=>({...m})),
    final:KNOCKOUT_MATCHES.filter(m=>m.stage==="決勝").sort((a,b)=>a.seed-b.seed).map(m=>({...m})),
    third:KNOCKOUT_MATCHES.filter(m=>m.stage==="3位決定戦").sort((a,b)=>a.seed-b.seed).map(m=>({...m}))
  };
  function fillFrom(prev, next, label){
    next.forEach((m,i)=>{
      const p1=prev[i*2], p2=prev[i*2+1];
      m.a=winnerOf(p1)||`勝者 ${matchLabel(label,i*2)}`;
      m.b=winnerOf(p2)||`勝者 ${matchLabel(label,i*2+1)}`;
    });
  }
  fillFrom(byStage.r32, byStage.r16, "R32-");
  fillFrom(byStage.r16, byStage.qf, "R16-");
  fillFrom(byStage.qf, byStage.sf, "QF-");
  if(byStage.final[0]){
    byStage.final[0].a=winnerOf(byStage.sf[0])||"勝者 SF-01";
    byStage.final[0].b=winnerOf(byStage.sf[1])||"勝者 SF-02";
  }
  if(byStage.third[0]){
    byStage.third[0].a=loserOf(byStage.sf[0])||"敗者 SF-01";
    byStage.third[0].b=loserOf(byStage.sf[1])||"敗者 SF-02";
  }
  return byStage;
}
function renderBracket(){
  const data=enrichKnockout();
  const cardW=220, cardH=118, gapX=58, topTitle=0, top0=50, row=146;
  const stageW=1360, stageH=2480;
  const xs=[8, 8+(cardW+gapX), 8+(cardW+gapX)*2, 8+(cardW+gapX)*3, 8+(cardW+gapX)*4];
  const titleMap=[
    ["ベスト32",xs[0]],["ベスト16",xs[1]],["準々決勝",xs[2]],["準決勝",xs[3]],["決勝",xs[4]]
  ];
  const pos={};
  const yR32=Array.from({length:16},(_,i)=>top0+i*row);
  const avg=(a,b)=>(a+b)/2;
  const yR16=Array.from({length:8},(_,i)=>avg(yR32[i*2],yR32[i*2+1]));
  const yQF=Array.from({length:4},(_,i)=>avg(yR16[i*2],yR16[i*2+1]));
  const ySF=Array.from({length:2},(_,i)=>avg(yQF[i*2],yQF[i*2+1]));
  const yFinal=avg(ySF[0],ySF[1]);
  let cards="", paths=[];
  function addCard(key,m,x,y,cls=""){
    if(!m) return;
    pos[key]={x,y,m};
    cards+=bracketCard(m,x,y,cls);
  }
  function edgeRight(p){return [p.x+cardW,p.y+cardH/2]}
  function edgeLeft(p){return [p.x,p.y+cardH/2]}
  function connect(a,b){
    const A=pos[a], B=pos[b];
    if(!A||!B) return;
    const from=edgeRight(A);
    const to=edgeLeft(B);
    paths.push(`<path d="${makeStepPath(from[0],from[1],to[0],to[1])}"/>`);
  }
  data.r32.forEach((m,i)=>addCard(`R32-${i}`,m,xs[0],yR32[i]));
  data.r16.forEach((m,i)=>addCard(`R16-${i}`,m,xs[1],yR16[i]));
  data.qf.forEach((m,i)=>addCard(`QF-${i}`,m,xs[2],yQF[i]));
  data.sf.forEach((m,i)=>addCard(`SF-${i}`,m,xs[3],ySF[i]));
  data.final.slice(0,1).forEach((m)=>addCard(`FINAL`,m,xs[4],yFinal,"final-main"));
  const third=data.third[0];
  const thirdY=yFinal+cardH+92;
  if(third) addCard(`THIRD`,third,xs[4],thirdY,"third-card");
  for(let i=0;i<8;i++){connect(`R32-${i*2}`,`R16-${i}`);connect(`R32-${i*2+1}`,`R16-${i}`)}
  for(let i=0;i<4;i++){connect(`R16-${i*2}`,`QF-${i}`);connect(`R16-${i*2+1}`,`QF-${i}`)}
  for(let i=0;i<2;i++){connect(`QF-${i*2}`,`SF-${i}`);connect(`QF-${i*2+1}`,`SF-${i}`)}
  connect("SF-0","FINAL");connect("SF-1","FINAL");
  const titles=titleMap.map(([name,x])=>`<h2 class="round-title" style="left:${x}px;top:${topTitle}px">${name}</h2>`).join("");
  const centerNote=`<div class="bracket-center-note" style="left:${xs[4]}px;top:${yFinal+cardH+18}px">左から右へ勝者が決勝へ進みます</div>`;
  const thirdTitle=third?`<h2 class="third-place-title" style="left:${xs[4]}px;top:${thirdY-42}px">3位決定戦</h2>`:"";
  content.innerHTML=`<section class="bracket-wrap">
    <p class="bracket-help">横にスワイプすると、ベスト32から決勝まで左から右へ進むBBC風トーナメントを見られます。スコア、LIVE、ET、PKはAPI取得後に自動反映します。</p>
    <div class="bracket-stage" style="width:${stageW}px;height:${stageH}px">
      <svg class="bracket-svg" viewBox="0 0 ${stageW} ${stageH}" preserveAspectRatio="none">${paths.join("")}</svg>
      ${titles}${cards}${centerNote}${thirdTitle}
    </div>
  </section>`;
}
function render(){
  stageName.textContent=mode==="group"?"グループステージ":"ノックアウト";
  renderFilters();
  renderHero();
  if(mode==="group")renderGroupList();else if(filter==="schedule")renderGroupList();else renderBracket();
  updatedAt.textContent=nowText();
}
stageButtons.forEach(b=>b.onclick=()=>{
  stageButtons.forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  mode=b.dataset.stage;
  filter=mode==="knockout"?"bracket":"all";
  render();
});
$("#refreshBtn").onclick=()=>{refreshApiData().then(()=>render())};
document.addEventListener("visibilitychange",()=>{if(!document.hidden)render()});
window.addEventListener("focus",render);
window.addEventListener("online",render);
setInterval(render,15*60*1000);
setInterval(()=>refreshApiData({silent:true}).then(ok=>{if(ok)render()}),API_CONFIG.refreshMs);
setInterval(tick,1000);
refreshApiData({silent:true}).then(()=>render());
render();
</script>
